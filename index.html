<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Entrena — Daniel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --legs:#22c55e;--legs-bg:#031a0e;--legs-dim:#0a2e18;
  --push:#3b82f6;--push-bg:#020d1f;--push-dim:#0a1e3a;
  --pull:#a855f7;--pull-bg:#0f0220;--pull-dim:#1a0838;
  --warm:#f97316;--warm-bg:#1c0800;
  --core:#06b6d4;--core-bg:#001419;
  --surface:#080e1a;--card:#111827;--card2:#141f30;
  --border:#1e2d42;--muted:#607080;--white:#e8f0f8;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--surface);color:var(--white);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body{padding-bottom:90px}
button{font-family:inherit;cursor:pointer}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(8,14,26,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 14px 9px}
.t1{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;flex:1;color:var(--white)}
.dtabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.dt{padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);background:rgba(255,255,255,.02);font-size:11px;font-weight:700;color:var(--muted);text-align:center;line-height:1.3;letter-spacing:.3px;transition:.15s}
.dt em{display:block;font-style:normal;font-size:16px;margin-bottom:2px}
.dt.on-legs{background:var(--legs-bg);color:var(--legs);border-color:var(--legs)}
.dt.on-push{background:var(--push-bg);color:var(--push);border-color:var(--push)}
.dt.on-pull{background:var(--pull-bg);color:var(--pull);border-color:var(--pull)}

/* HERO */
.hero{padding:20px 16px 10px;text-align:center}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;line-height:1}
.hmeta{font-size:12px;color:var(--muted);margin-top:4px}
.htags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.htag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.4px}

/* PROGRESS */
.prog{padding:0 16px 12px}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.prog-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* SECTION */
.sec{display:flex;align-items:center;gap:8px;padding:14px 16px 7px}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-btn{font-size:11px;font-weight:600;color:var(--muted);padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;white-space:nowrap}

/* CARDS */
.cards{padding:0 16px;display:flex;flex-direction:column;gap:10px}

/* TIMED BLOCK */
.tblock{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.tblock-hdr{padding:11px 14px 9px;border-bottom:1px solid var(--border)}
.tblock-title{font-size:10px;font-weight:700;letter-spacing:.7px}
.tblock-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.tex-list{display:flex;flex-direction:column}
.tex-item{display:flex;align-items:stretch;border-bottom:1px solid var(--border);transition:background .1s}
.tex-item:last-child{border-bottom:none}
.tex-item.done{opacity:.38}
.tex-img{width:80px;min-height:82px;flex-shrink:0;overflow:hidden;background:#050a12;position:relative;cursor:pointer}
.tex-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.tex-img .p0{opacity:1}.tex-img .p1{opacity:0}
.tex-img.anim .p0{animation:flip 1.4s steps(1) infinite}
.tex-img.anim .p1{animation:flip2 1.4s steps(1) infinite}
@keyframes flip{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes flip2{0%,49%{opacity:0}50%,100%{opacity:1}}
.tex-done-badge{display:none;position:absolute;inset:0;background:rgba(0,0,0,.65);align-items:center;justify-content:center;font-size:24px}
.tex-item.done .tex-done-badge{display:flex}
.tex-body{flex:1;padding:10px 12px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.tex-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--white);cursor:pointer}
.tex-meta{font-size:10px;font-weight:700;letter-spacing:.3px;margin-top:2px}
.tex-instr{font-size:11px;color:var(--muted);line-height:1.5;margin-top:6px;display:none;padding-top:6px;border-top:1px solid var(--border)}
.tex-item.open .tex-instr{display:block}
.tex-toggle{font-size:10px;font-weight:600;margin-top:4px;opacity:.6;cursor:pointer}
.tblock-footer{padding:10px 14px 12px;display:flex;gap:8px}
.tbtn{flex:1;padding:10px;border-radius:9px;border:none;font-size:12px;font-weight:700;color:#fff;letter-spacing:.2px}
.tbtn:active{opacity:.8}
.tedit{padding:10px 14px;border-radius:9px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;color:var(--muted)}

/* MAIN EXERCISE CARD */
.excard{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.excard.done{opacity:.38}
.ex-img{width:100%;height:190px;overflow:hidden;background:#050a12;position:relative;cursor:pointer}
.ex-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ex-img .p0{opacity:1}.ex-img .p1{opacity:0}
.ex-img.anim .p0{animation:flip 1.6s steps(1) infinite}
.ex-img.anim .p1{animation:flip2 1.6s steps(1) infinite}
.ex-img.paused .p0,.ex-img.paused .p1{animation-play-state:paused}
.ex-anim-btn{position:absolute;bottom:8px;right:8px;font-size:10px;font-weight:700;background:rgba(0,0,0,.7);color:rgba(255,255,255,.8);padding:4px 9px;border-radius:20px;letter-spacing:.3px;pointer-events:none}
.excard-body{padding:14px}
.ex-name{font-size:15px;font-weight:700;line-height:1.25}
.ex-muscle{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:3px}
.chips{display:flex;gap:6px;margin-top:12px}
.chip{flex:1;background:rgba(255,255,255,.04);border-radius:9px;padding:8px 4px;text-align:center}
.chip-v{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;line-height:1;display:block}
.chip-l{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.4px;margin-top:1px;display:block}
.ex-tip{font-size:11px;color:var(--muted);line-height:1.55;padding:10px 0 0;border-top:1px solid var(--border);margin-top:12px}
.done-btn{width:100%;margin-top:12px;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.2px;transition:.15s}
.done-btn.marked{border-color:transparent;color:#080e1a}
.done-btn:active{opacity:.7}

/* FAB */
.fab{position:fixed;bottom:20px;right:16px;z-index:200;width:62px;height:62px;border-radius:50%;border:none;background:var(--white);color:#080e1a;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,.6);transition:transform .15s}
.fab:active{transform:scale(.9)}
.fab-t{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;line-height:1}
.fab-l{font-size:8px;font-weight:700;color:#4a6070;margin-top:1px;letter-spacing:.3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.fab.running .fab-t{animation:pulse 1s infinite}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--card2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;border-top:1px solid var(--border)}
.modal-hdr{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-close{font-size:20px;color:var(--muted);background:none;border:none;padding:2px 8px;line-height:1}
.modal-note{font-size:11px;color:var(--muted);padding:8px 16px 4px;flex-shrink:0}
.modal-body{overflow-y:auto;flex:1;padding:6px 14px 10px;display:flex;flex-direction:column;gap:6px}
.mitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;border:1.5px solid var(--border);background:rgba(255,255,255,.02);cursor:pointer;transition:.15s}
.mitem.sel{background:rgba(255,255,255,.05)}
.mitem-img{width:58px;height:52px;border-radius:8px;overflow:hidden;background:#050a12;flex-shrink:0;position:relative}
.mitem-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.mitem-img .p1m{opacity:0}
.mitem-img.anim img:first-child{animation:flip 1.4s steps(1) infinite}
.mitem-img.anim .p1m{animation:flip2 1.4s steps(1) infinite}
.mitem-info{flex:1;min-width:0}
.mitem-name{font-size:13px;font-weight:600;line-height:1.2}
.mitem-meta{font-size:10px;color:var(--muted);margin-top:2px}
.mitem-instr{font-size:11px;color:var(--muted);line-height:1.45;margin-top:5px;display:none}
.mitem.open .mitem-instr{display:block}
.mitem-exp{font-size:10px;font-weight:600;margin-top:3px;opacity:.6}
.mcheck{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:.15s}
.modal-footer{padding:12px 14px 28px;border-top:1px solid var(--border);flex-shrink:0}
.modal-save{width:100%;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;color:#080e1a}
</style>
</head>
<body>

<div class="topbar">
  <div class="t1"><span class="logo">ENTRENA</span></div>
  <div class="dtabs">
    <button class="dt on-legs" onclick="showDay('legs')" id="btn-legs"><em>🦵</em>PIERNAS</button>
    <button class="dt" onclick="showDay('push')" id="btn-push"><em>💪</em>EMPUJES</button>
    <button class="dt" onclick="showDay('pull')" id="btn-pull"><em>🏋️</em>TIRÓN</button>
  </div>
</div>

<div class="hero">
  <div class="htitle" id="htitle">PIERNAS</div>
  <div class="hmeta" id="hmeta">~60 min</div>
  <div class="htags" id="htags"></div>
</div>

<div class="prog">
  <div class="prog-row"><span id="ptxt">0 completados</span><span id="ppct">0%</span></div>
  <div class="prog-track"><div class="prog-fill" id="pfill"></div></div>
</div>

<div id="content"></div>

<button class="fab" id="fab" onclick="toggleFab()">
  <span class="fab-t" id="fabt">1:30</span>
  <span class="fab-l" id="fabl">TIMER</span>
</button>

<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="mtitle">Seleccionar</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-note" id="mnote"></div>
    <div class="modal-body" id="mbody"></div>
    <div class="modal-footer">
      <button class="modal-save" id="msave" onclick="saveModal()">Guardar selección</button>
    </div>
  </div>
</div>

<script>
const B = "https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises";
const I = f => [`${B}/${f}/0.jpg`, `${B}/${f}/1.jpg`];

// ── WARMUP POOL ──────────────────────────────────────────────────
const WARMUP = [
  {id:'inchworm', name:'Gusano (Inchworm)', meta:'3 × 25 seg', img:I('Inchworm'),
   instr:'De pie, flexiona caderas, apoya las manos en el suelo y camina con ellas hasta plancha. Vuelve caminando las manos hacia los pies. Piernas lo más rectas posible.'},
  {id:'jumping', name:'Jumping Jacks', meta:'3 × 25 seg', img:I('Star_Jump'),
   instr:'De pie con pies juntos. Salta abriendo piernas y subiendo brazos sobre la cabeza simultáneamente. Vuelve al centro con ritmo constante.'},
  {id:'mountain', name:'Mountain Climbers', meta:'3 × 25 seg', img:I('Mountain_Climbers'),
   instr:'En plancha alta, lleva alternando cada rodilla hacia el pecho con movimiento rápido. Caderas bajas, core activo, sin girar el torso.'},
  {id:'squat_bw', name:'Sentadilla sin peso', meta:'3 × 25 seg', img:I('Bodyweight_Squat'),
   instr:'Pies a anchura de hombros, brazos al frente. Baja flexionando rodillas y caderas hasta muslos paralelos al suelo. Espalda recta, pecho arriba.'},
  {id:'skipping', name:'Skipping (rodillas altas)', meta:'3 × 25 seg', img:I('Fast_Skipping'),
   instr:'Trota en el sitio elevando las rodillas por encima de la cadera de forma alternada. Torso erguido, core activo, brazos acompañan el movimiento.'},
  {id:'burpee', name:'Burpees', meta:'3 × 25 seg', img:I('Single_Leg_Butt_Kick'),
   instr:'De pie, baja manos al suelo, lleva pies atrás (plancha), haz una flexión, vuelve pies a manos y salta hacia arriba con brazos extendidos.'},
  {id:'rotacion', name:'Rotación de brazos', meta:'3 × 25 seg', img:I('Arm_Circles'),
   instr:'De pie, brazos en cruz. Realiza círculos progresivos desde el hombro hacia adelante 15 seg y hacia atrás 15 seg. Aumenta el radio paulatinamente.'},
  {id:'lunge_bw', name:'Zancadas sin peso', meta:'3 × 25 seg', img:I('Bodyweight_Walking_Lunge'),
   instr:'Paso largo hacia adelante, rodilla trasera cerca del suelo. Vuelve y alterna. Torso erguido. Activa el glúteo al empujar para volver.'},
  {id:'hipcirc', name:'Círculos de cadera', meta:'3 × 25 seg', img:I('Barbell_Hip_Thrust'),
   instr:'De pie, manos en caderas. Realiza círculos amplios con la cadera, 10 en cada dirección. Moviliza la articulación de la cadera antes de cargar.'},
];

// ── CORE POOL ────────────────────────────────────────────────────
const CORE = [
  {id:'plancha', name:'Plancha frontal', meta:'4 × 30 seg', img:I('Plank'),
   instr:'Antebrazos y puntillas en el suelo. Cuerpo recto de cabeza a talones. Activa el abdomen como si recibieras un golpe. Sin hundir ni elevar la cadera.'},
  {id:'planchalat', name:'Plancha lateral', meta:'4 × 30 seg (c/lado)', img:I('Push_Up_to_Side_Plank'),
   instr:'Antebrazo y borde lateral del pie. Cuerpo en línea recta. Levanta la cadera del suelo. El pie de arriba puede ir adelante para más estabilidad.'},
  {id:'dead_bug', name:'Dead Bug', meta:'4 × 30 seg', img:I('Dead_Bug'),
   instr:'Tumbado boca arriba, brazos al techo, rodillas a 90°. Baja brazo derecho y pierna izquierda sin que la lumbar se despegue del suelo. Alterna lados.'},
  {id:'russian', name:'Russian Twist KB', meta:'4 × 30 seg', img:I('Russian_Twist'),
   instr:'Sentado, rodillas dobladas, espalda 45°. Con KB rota el torso tocando el suelo a cada lado. Eleva los pies para más dificultad.'},
  {id:'mountain_c', name:'Mountain Climbers (lento)', meta:'4 × 30 seg', img:I('Mountain_Climbers'),
   instr:'Plancha alta, lleva rodillas al pecho alternando de forma controlada. Caderas bajas. Activa el core en todo momento. Ritmo controlado, no explosivo.'},
  {id:'superman', name:'Superman', meta:'4 × 30 seg', img:I('Superman'),
   instr:'Boca abajo, brazos extendidos al frente. Eleva simultáneamente brazos, pecho y piernas. Aguanta 2 seg arriba. Baja controlado. Refuerza lumbar.'},
  {id:'empuje_rod', name:'Empuje de rodillas', meta:'4 × 30 seg', img:I('Dead_Bug'),
   instr:'A cuatro patas. Extiende brazo derecho y pierna izquierda al mismo tiempo. Aguanta 2 seg. Baja y alterna. Estabiliza el core antes de mover.'},
  {id:'toques', name:'Toques laterales', meta:'4 × 30 seg', img:I('Dead_Bug'),
   instr:'Tumbado, rodillas dobladas. Desliza la mano hacia el tobillo del mismo lado flexionando el lateral. Vuelve al centro y repite al otro lado.'},
  {id:'hollow', name:'Hollow Body Hold', meta:'4 × 30 seg', img:I('Plank'),
   instr:'Tumbado, presiona lumbar al suelo. Eleva hombros y piernas ligeramente. Brazos extendidos atrás. Sin arquear la espalda baja en ningún momento.'},
  {id:'glute_kick', name:'Patada de glúteo', meta:'4 × 30 seg', img:I('Glute_Kickback'),
   instr:'A cuatro patas, extiende una pierna atrás y arriba apretando el glúteo. Mantén la cadera nivelada. Alterna lados. Ideal para activar glúteo.'},
];

// ── EXERCISE POOLS ───────────────────────────────────────────────
const POOLS = {
  legs: [
    {id:'squat', name:'Sentadilla con barra', mus:'Cuádriceps · Glúteos · Core', img:I('Barbell_Full_Squat'),
     sets:'4', reps:'8–10', rest:'2:30',
     tip:'Barra en trapecio, pies a anchura de hombros. Rodillas siguen la punta del pie. Baja hasta muslos paralelos al suelo.'},
    {id:'rdl', name:'Peso muerto rumano KB', mus:'Isquiotibiales · Glúteos · Lumbar', img:I('Romanian_Deadlift'),
     sets:'3', reps:'10–12', rest:'2:00',
     tip:'Espalda neutra, caderas atrás. KB pegados a las piernas todo el movimiento. Siente el estiramiento en isquios antes de subir.'},
    {id:'lunge', name:'Zancadas con KB', mus:'Cuádriceps · Glúteos · Equilibrio', img:I('Barbell_Lunge'),
     sets:'3', reps:'10 c/p', rest:'1:30',
     tip:'Paso largo, rodilla trasera cerca del suelo sin tocar. Torso erguido. Empuja con el talón delantero para volver.'},
    {id:'hipthrust', name:'Hip thrust con barra', mus:'Glúteos · Isquios', img:I('Barbell_Hip_Thrust'),
     sets:'4', reps:'12', rest:'2:00',
     tip:'Hombros en banco, barra sobre cadera con almohadilla. Empuja la cadera arriba apretando glúteo. Pausa 1 seg arriba.'},
    {id:'bulgaro', name:'Sentadilla búlgara KB', mus:'Cuádriceps · Glúteo', img:I('Split_Squat_with_Dumbbells'),
     sets:'3', reps:'10 c/p', rest:'2:00',
     tip:'Pie trasero elevado en banco. Baja controlado 2 seg. La rodilla delantera no sobrepasa la punta del pie. KB en cada mano.'},
    {id:'calf', name:'Elevaciones de gemelo', mus:'Gemelos · Sóleo', img:I('Standing_Calf_Raises'),
     sets:'3', reps:'15–20', rest:'1:00',
     tip:'Pausa 1 seg arriba, baja lento 3 seg. Si haces más de 20 con facilidad, añade carga con barra en hombros.'},
    {id:'hyperext', name:'Hiperextensiones (silla romana)', mus:'Lumbar · Glúteo · Isquios', img:I('Hyperextensions_Back_Extensions'),
     sets:'3', reps:'12', rest:'1:30',
     tip:'Imprescindible si cargas barra. Brazos cruzados en pecho o con disco para añadir peso. Sube hasta alineación, no hiperextiendas.'},
    {id:'deadlift', name:'Peso muerto convencional', mus:'Cadena posterior · Trapecios · Core', img:I('Barbell_Deadlift'),
     sets:'4', reps:'5–6', rest:'3:00',
     tip:'El rey de la cadena posterior. Barra pegada a las piernas en todo momento. Activa el core antes de tirar. Mira al frente.'},
    {id:'goblet', name:'Sentadilla goblet KB', mus:'Cuádriceps · Glúteos · Core', img:I('Goblet_Squat'),
     sets:'3', reps:'12', rest:'1:30',
     tip:'KB sujeto con ambas manos al pecho. Codos apuntan abajo entre las rodillas. Perfecto para dominar la técnica de sentadilla.'},
    {id:'sumo', name:'Peso muerto sumo KB', mus:'Glúteos · Isquios · Aductores', img:I('Sumo_Deadlift'),
     sets:'3', reps:'10', rest:'2:00',
     tip:'Pies más anchos que los hombros, puntas hacia afuera. KB entre las piernas. Más énfasis en glúteos y aductores que el convencional.'},
    {id:'walking_lunge', name:'Zancadas caminando KB', mus:'Cuádriceps · Glúteos', img:I('Barbell_Walking_Lunge'),
     sets:'3', reps:'12 c/p', rest:'1:30',
     tip:'Da zancadas hacia adelante sin parar. Cada paso es una repetición. Excelente para el equilibrio dinámico y la coordinación.'},
    {id:'stepup', name:'Step-up con KB', mus:'Cuádriceps · Glúteos · Equilibrio', img:I('Dumbbell_Step_Ups'),
     sets:'3', reps:'10 c/p', rest:'1:30',
     tip:'Sube al banco empujando con el talón del pie de arriba. No te impulses con el pie del suelo. Baja controlado.'},
    {id:'goodmorning', name:'Good Morning (barra)', mus:'Isquiotibiales · Lumbar · Glúteos', img:I('Good_Morning'),
     sets:'3', reps:'10', rest:'2:00',
     tip:'Barra en trapecios, rodillas ligeramente dobladas. Inclina el torso hacia adelante manteniendo la espalda recta. Vuelve con los glúteos.'},
    {id:'glutebridge', name:'Puente de glúteo con barra', mus:'Glúteos · Isquios', img:I('Barbell_Glute_Bridge'),
     sets:'3', reps:'15', rest:'1:30',
     tip:'Tumbado con barra sobre las caderas. Eleva la cadera hasta alineación con el torso. Pausa 1 seg arriba apretando el glúteo.'},
    {id:'legcurl', name:'Curl femoral en banco', mus:'Isquiotibiales · Pantorrilla', img:I('Glute_Ham_Raise'),
     sets:'3', reps:'12', rest:'1:30',
     tip:'Usa la silla romana o banco inclinado. Dobla las rodillas llevando los talones al glúteo de forma controlada. Baja lento.'},
  ],

// Defaults (10 per day)
const DEFAULTS = {
  legs: ['squat','rdl','lunge','hipthrust','bulgaro','calf','hyperext','deadlift','goblet','stepup'],
  push: ['bench_flat','bench_inc','dips','ohpress','flyes_inc','lateral','skull','bench_dips','arnold','pushups'],
  pull: ['pullup','row_bar','row_trx','chinup','facepull','curl_kb','curl_hammer','row_kb','pullover','conc_curl'],
  warm: ['inchworm','jumping','mountain','squat_bw'],
  core: ['plancha','planchalat','dead_bug','russian'],
};

// Load saved state or use defaults
function loadSel(key, pool, defaultIds) {
  const saved = localStorage.getItem('sel_' + key);
  if (saved) {
    const ids = JSON.parse(saved);
    // validate ids still exist in pool
    const validIds = ids.filter(id => pool.find(e => e.id === id));
    if (validIds.length >= 2) return new Set(validIds);
  }
  return new Set(defaultIds);
}

function saveSel(key, set) {
  localStorage.setItem('sel_' + key, JSON.stringify([...set]));
}

let day = 'legs';
let selLegs, selPush, selPull, selWarm, selCore;

function initSel() {
  selLegs = loadSel('legs', POOLS.legs, DEFAULTS.legs);
  selPush = loadSel('push', POOLS.push, DEFAULTS.push);
  selPull = loadSel('pull', POOLS.pull, DEFAULTS.pull);
  selWarm = loadSel('warm', WARMUP, DEFAULTS.warm);
  selCore = loadSel('core', CORE, DEFAULTS.core);
}

function getSel(key) {
  if (key === 'legs') return selLegs;
  if (key === 'push') return selPush;
  if (key === 'pull') return selPull;
  if (key === 'warm') return selWarm;
  if (key === 'core') return selCore;
}

let doneMain = {}, doneWarm = new Set(), doneCore = new Set();
let timerSec = 90, timerRun = false, timerInt = null;
let mMode = 'warm', mTemp = new Set();

const DAYS_META = {
  legs: { title:'PIERNAS', meta:'~60 min', c:'--legs', dim:'--legs-dim', tags:['Cuádriceps','Glúteos','Isquios','Gemelos','Lumbar'] },
  push: { title:'EMPUJES', meta:'~55 min', c:'--push', dim:'--push-dim', tags:['Pecho','Hombro','Tríceps'] },
  pull: { title:'TIRÓN',   meta:'~55 min', c:'--pull', dim:'--pull-dim', tags:['Espalda','Bíceps','Manguito'] },
};

// ── RENDER ───────────────────────────────────────────────────────
function render() {
  const m = DAYS_META[day];
  document.getElementById('htitle').textContent = m.title;
  document.getElementById('htitle').style.color = `var(${m.c})`;
  document.getElementById('hmeta').textContent = m.meta;
  document.getElementById('htags').innerHTML = m.tags.map(t =>
    `<span class="htag" style="background:var(${m.dim});color:var(${m.c})">${t}</span>`).join('');
  ['legs','push','pull'].forEach(k => {
    document.getElementById('btn-'+k).className = 'dt' + (k === day ? ' on-'+k : '');
  });
  document.getElementById('pfill').style.background = `var(${m.c})`;
  build();
  updProg();
}

function build() {
  const m = DAYS_META[day];
  const wl = WARMUP.filter(e => selWarm.has(e.id));
  const cl = CORE.filter(e => selCore.has(e.id));
  const ml = POOLS[day].filter(e => getSel(day).has(e.id));
  let h = '<div class="cards">';

  // WARMUP
  h += sec('var(--warm)', 'Calentamiento', 'warm');
  h += tblock('warm', wl, '3 SERIES · 25 SEG TRABAJO · 10 SEG PAUSA', 25);

  // CORE
  h += sec('var(--core)', 'Core', 'core');
  h += tblock('core', cl, '4 SERIES · 30 SEG TRABAJO · 15 SEG PAUSA', 30);

  // MAIN
  h += sec(`var(${m.c})`, 'Ejercicios principales', day);
  ml.forEach((ex, i) => {
    const done = !!doneMain[ex.id];
    h += `<div class="excard${done ? ' done' : ''}" id="ec${ex.id}">
      <div class="ex-img anim" id="ei${ex.id}" onclick="pauseImg('${ex.id}',this)">
        <img class="p0" src="${ex.img[0]}" loading="lazy" alt="">
        <img class="p1" src="${ex.img[1]}" loading="lazy" alt="">
        <span class="ex-anim-btn" id="eab${ex.id}">⏸ pausar</span>
      </div>
      <div class="excard-body">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-muscle" style="color:var(${m.c})">${ex.mus}</div>
        <div class="chips">
          <div class="chip"><span class="chip-v" style="color:var(${m.c})">${ex.sets}</span><span class="chip-l">SERIES</span></div>
          <div class="chip"><span class="chip-v" style="color:var(${m.c});font-size:${ex.reps.length > 5 ? '14px' : '20px'}">${ex.reps}</span><span class="chip-l">REPS</span></div>
          <div class="chip"><span class="chip-v" style="color:var(${m.c});font-size:14px">${ex.rest}</span><span class="chip-l">DESCANSO</span></div>
        </div>
        <div class="ex-tip">${ex.tip}</div>
        <button class="done-btn${done ? ' marked' : ''}" style="${done ? `background:var(${m.c})` : ''}" onclick="markMain('${ex.id}','${ex.rest}')">
          ${done ? '✓ Completado' : '→ Marcar hecho'}
        </button>
      </div>
    </div>`;
  });

  h += '</div>';
  document.getElementById('content').innerHTML = h;
}

function sec(color, label, mode) {
  const b = mode ? `<button class="sec-btn" onclick="openModal('${mode}')">✏ Editar</button>` : '';
  return `<div class="sec"><div class="sec-dot" style="background:${color}"></div><span class="sec-lbl">${label}</span><div class="sec-line"></div>${b}</div>`;
}

function tblock(type, list, label, secs) {
  const color = type === 'warm' ? 'var(--warm)' : 'var(--core)';
  let h = `<div class="tblock"><div class="tblock-hdr">
    <div class="tblock-title" style="color:${color}">${label}</div>
    <div class="tblock-sub">Tap en la foto para marcar · Tap en el nombre para instrucciones</div>
  </div><div class="tex-list">`;
  list.forEach(ex => {
    const done = type === 'warm' ? doneWarm.has(ex.id) : doneCore.has(ex.id);
    h += `<div class="tex-item${done ? ' done' : ''}" id="ti${ex.id}">
      <div class="tex-img anim" onclick="toggleTimed('${type}','${ex.id}')">
        <img class="p0" src="${ex.img[0]}" loading="lazy" alt="">
        <img class="p1" src="${ex.img[1]}" loading="lazy" alt="">
        <div class="tex-done-badge">✓</div>
      </div>
      <div class="tex-body">
        <div class="tex-name" onclick="expandTex('${ex.id}')">${ex.name}</div>
        <div class="tex-meta" style="color:${color}">${ex.meta}</div>
        <div class="tex-instr">${ex.instr}</div>
        <div class="tex-toggle" style="color:${color}" onclick="expandTex('${ex.id}')" id="texp${ex.id}">▸ instrucciones</div>
      </div>
    </div>`;
  });
  h += `</div><div class="tblock-footer">
    <button class="tbtn" style="background:${color}" onclick="startBlock(${secs})">▶ Timer ${secs} seg</button>
    <button class="tedit" onclick="openModal('${type}')">✏ Editar</button>
  </div></div>`;
  return h;
}

function updProg() {
  const ml = POOLS[day].filter(e => getSel(day).has(e.id));
  const total = ml.length + selWarm.size + selCore.size;
  const count = Object.values(doneMain).filter(Boolean).length + doneWarm.size + doneCore.size;
  const pct = total ? Math.round(count / total * 100) : 0;
  document.getElementById('ptxt').textContent = `${count} de ${total} completados`;
  document.getElementById('ppct').textContent = pct + '%';
  document.getElementById('pfill').style.width = pct + '%';
}

// ── INTERACTIONS ──────────────────────────────────────────────────
function showDay(d) {
  day = d; doneMain = {}; doneWarm = new Set(); doneCore = new Set();
  render(); window.scrollTo({ top: 0, behavior: 'smooth' });
}

function markMain(id, rest) {
  doneMain[id] = !doneMain[id];
  if (doneMain[id]) startBlock(parseRest(rest));
  build(); updProg();
}

function toggleTimed(type, id) {
  const s = type === 'warm' ? doneWarm : doneCore;
  if (s.has(id)) s.delete(id); else s.add(id);
  const el = document.getElementById('ti' + id);
  if (el) el.classList.toggle('done', s.has(id));
  updProg();
}

function expandTex(id) {
  const item = document.getElementById('ti' + id);
  if (!item) return;
  const open = item.classList.toggle('open');
  const btn = document.getElementById('texp' + id);
  if (btn) btn.textContent = open ? '▾ ocultar' : '▸ instrucciones';
}

function pauseImg(id, el) {
  const paused = el.classList.toggle('paused');
  const btn = document.getElementById('eab' + id);
  if (btn) btn.textContent = paused ? '▶ animar' : '⏸ pausar';
}

function parseRest(s) { const [m, sc] = s.split(':').map(Number); return m * 60 + (sc || 0); }

// ── TIMER ─────────────────────────────────────────────────────────
function startBlock(s) { timerSec = s; if (timerInt) clearInterval(timerInt); timerRun = false; updFab(); startTimer(); }
function startTimer() {
  if (timerInt) clearInterval(timerInt);
  timerRun = true;
  document.getElementById('fab').classList.add('running');
  timerInt = setInterval(() => {
    timerSec--;
    if (timerSec <= 0) {
      clearInterval(timerInt); timerInt = null; timerRun = false;
      document.getElementById('fab').classList.remove('running');
      document.getElementById('fabl').textContent = '¡LISTO!';
      timerSec = 0;
    }
    updFab();
  }, 1000);
}
function toggleFab() {
  if (timerRun) { clearInterval(timerInt); timerInt = null; timerRun = false; document.getElementById('fab').classList.remove('running'); }
  else { if (timerSec <= 0) timerSec = 90; startTimer(); }
}
function updFab() {
  const m = Math.floor(timerSec / 60), s = timerSec % 60;
  document.getElementById('fabt').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  if (timerSec > 0) document.getElementById('fabl').textContent = 'TIMER';
}

// ── MODAL ─────────────────────────────────────────────────────────
const MODAL_CFG = {
  warm: { title:'Calentamiento', color:'var(--warm)', pool:WARMUP, min:2, max:6 },
  core: { title:'Core', color:'var(--core)', pool:CORE, min:2, max:6 },
  legs: { title:'Piernas — ejercicios', color:'var(--legs)', pool:POOLS.legs, min:4, max:12 },
  push: { title:'Empujes — ejercicios', color:'var(--push)', pool:POOLS.push, min:4, max:12 },
  pull: { title:'Tirón — ejercicios', color:'var(--pull)', pool:POOLS.pull, min:4, max:12 },
};

function openModal(mode) {
  mMode = mode;
  const cfg = MODAL_CFG[mode];
  const sel = getSel(mode);
  mTemp = new Set(sel);
  document.getElementById('mtitle').textContent = cfg.title;
  document.getElementById('msave').style.background = cfg.color;
  document.getElementById('mnote').textContent = `Mín. ${cfg.min} · Máx. ${cfg.max} · ${sel.size} seleccionados`;
  document.getElementById('mbody').innerHTML = cfg.pool.map(ex => {
    const s = sel.has(ex.id);
    return `<div class="mitem${s ? ' sel' : ''}" id="mi${ex.id}" style="color:${s ? cfg.color : 'var(--muted)'}" onclick="toggleMI('${ex.id}')">
      <div class="mitem-img anim">
        <img src="${ex.img[0]}" loading="lazy" alt="">
        <img class="p1m" src="${ex.img[1]}" loading="lazy" alt="">
      </div>
      <div class="mitem-info">
        <div class="mitem-name">${ex.name}</div>
        <div class="mitem-meta">${ex.meta || (ex.sets + ' × ' + ex.reps)}</div>
        <div class="mitem-instr">${ex.instr || ex.tip}</div>
        <div class="mitem-exp" onclick="expandMI('${ex.id}',event)">▸ instrucciones</div>
      </div>
      <div class="mcheck" id="mc${ex.id}" style="${s ? `border-color:${cfg.color};background:${cfg.color};color:#080e1a` : ''}">${s ? '✓' : ''}</div>
    </div>`;
  }).join('');
  document.getElementById('overlay').classList.add('open');
}

function toggleMI(id) {
  const cfg = MODAL_CFG[mMode];
  const el = document.getElementById('mi' + id);
  const chk = document.getElementById('mc' + id);
  if (mTemp.has(id)) {
    if (mTemp.size <= cfg.min) { flashNote(`Mínimo ${cfg.min} ejercicios`); return; }
    mTemp.delete(id);
    el.classList.remove('sel'); el.style.color = 'var(--muted)';
    chk.style.cssText = ''; chk.textContent = '';
  } else {
    if (mTemp.size >= cfg.max) { flashNote(`Máximo ${cfg.max} ejercicios`); return; }
    mTemp.add(id);
    el.classList.add('sel'); el.style.color = cfg.color;
    chk.style.cssText = `border-color:${cfg.color};background:${cfg.color};color:#080e1a`; chk.textContent = '✓';
  }
  document.getElementById('mnote').textContent = `Mín. ${cfg.min} · Máx. ${cfg.max} · ${mTemp.size} seleccionados`;
}

function flashNote(msg) {
  const n = document.getElementById('mnote');
  const prev = n.textContent;
  n.style.color = 'var(--warm)'; n.textContent = msg;
  setTimeout(() => { n.style.color = ''; n.textContent = prev; }, 1500);
}

function expandMI(id, e) {
  e.stopPropagation();
  const item = document.getElementById('mi' + id);
  const open = item.classList.toggle('open');
  e.target.textContent = open ? '▾ ocultar' : '▸ instrucciones';
}

function saveModal() {
  if (mMode === 'warm') { selWarm = new Set(mTemp); saveSel('warm', selWarm); }
  else if (mMode === 'core') { selCore = new Set(mTemp); saveSel('core', selCore); }
  else if (mMode === 'legs') { selLegs = new Set(mTemp); saveSel('legs', selLegs); }
  else if (mMode === 'push') { selPush = new Set(mTemp); saveSel('push', selPush); }
  else if (mMode === 'pull') { selPull = new Set(mTemp); saveSel('pull', selPull); }
  closeModal(); doneMain = {}; build(); updProg();
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function bgClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

initSel();
render();
</script>
</body>
</html>
