<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Entrena</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --legs:#22c55e;--legs-bg:#031a0e;--legs-dim:#0a2e18;
  --push:#3b82f6;--push-bg:#020d1f;--push-dim:#0a1e3a;
  --pull:#a855f7;--pull-bg:#0f0220;--pull-dim:#1a0838;
  --warm:#f97316;--warm-bg:#1c0800;
  --core:#06b6d4;--core-bg:#001419;
  --surface:#080e1a;--card:#111827;--card2:#141f30;
  --border:#1e2d42;--muted:#607080;--white:#e8f0f8;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--surface);color:var(--white);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body{padding-bottom:20px}
button{font-family:inherit;cursor:pointer}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(8,14,26,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 14px 9px}
.t1{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;flex:1}
.dtabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.dt{padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);background:rgba(255,255,255,.02);font-size:11px;font-weight:700;color:var(--muted);text-align:center;line-height:1.3;letter-spacing:.3px;transition:.15s}
.dt em{display:block;font-style:normal;font-size:16px;margin-bottom:2px}
.dt.on-legs{background:var(--legs-bg);color:var(--legs);border-color:var(--legs)}
.dt.on-push{background:var(--push-bg);color:var(--push);border-color:var(--push)}
.dt.on-pull{background:var(--pull-bg);color:var(--pull);border-color:var(--pull)}

/* HERO */
.hero{padding:20px 16px 10px;text-align:center}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;line-height:1}
.hmeta{font-size:12px;color:var(--muted);margin-top:4px}
.htags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.htag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.4px}

/* PROGRESS */
.prog{padding:0 16px 12px}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.prog-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* SECTION */
.sec{display:flex;align-items:center;gap:8px;padding:14px 16px 7px}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-btn{font-size:11px;font-weight:600;color:var(--muted);padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;white-space:nowrap}

/* CARDS */
.cards{padding:0 16px;display:flex;flex-direction:column;gap:10px}

/* ── TIMER BAR ── */
.tbar-wrap{padding:0 16px 0;margin-bottom:10px}
.tbar-card{background:var(--card2);border-radius:12px;border:1px solid var(--border);overflow:hidden}
.tbar-info{display:flex;align-items:center;gap:10px;padding:10px 12px 8px}
.tbar-phase{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;flex:1}
.tbar-count{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1;min-width:44px;text-align:right}
.tbar-countdown{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:var(--muted);min-width:20px;text-align:center}
.tbar-btns{display:flex;gap:6px}
.tbar-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:14px;transition:.15s}
.tbar-btn:active{opacity:.6}
.tbar-track{height:6px;background:var(--border);position:relative}
.tbar-fill{height:100%;transition:width .9s linear;position:relative}
.tbar-fill::after{content:'';position:absolute;right:0;top:-3px;width:3px;height:12px;border-radius:2px;background:inherit;opacity:.8}
.tbar-label{font-size:10px;color:var(--muted);padding:5px 12px 8px;line-height:1.3;min-height:22px}

/* TIMED BLOCK */
.tblock{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.tblock-hdr{padding:11px 14px 9px;border-bottom:1px solid var(--border)}
.tblock-title{font-size:10px;font-weight:700;letter-spacing:.7px}
.tblock-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.tex-list{display:flex;flex-direction:column}
.tex-item{display:flex;align-items:stretch;border-bottom:1px solid var(--border);transition:background .1s}
.tex-item:last-child{border-bottom:none}
.tex-item.done{opacity:.38}
.tex-item.active-ex{background:rgba(255,255,255,.04)}
.tex-img{width:80px;min-height:82px;flex-shrink:0;overflow:hidden;background:#050a12;position:relative;cursor:pointer}
.tex-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.tex-img .p0{opacity:1}.tex-img .p1{opacity:0}
.tex-img.anim .p0{animation:flip 1.4s steps(1) infinite}
.tex-img.anim .p1{animation:flip2 1.4s steps(1) infinite}
@keyframes flip{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes flip2{0%,49%{opacity:0}50%,100%{opacity:1}}
.tex-done-badge{display:none;position:absolute;inset:0;background:rgba(0,0,0,.65);align-items:center;justify-content:center;font-size:24px}
.tex-item.done .tex-done-badge{display:flex}
.tex-active-dot{width:6px;height:6px;border-radius:50%;background:var(--warm);flex-shrink:0;align-self:center;margin-left:-4px;display:none}
.tex-item.active-ex .tex-active-dot{display:block}
.tex-body{flex:1;padding:10px 12px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.tex-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--white);cursor:pointer}
.tex-meta{font-size:10px;font-weight:700;letter-spacing:.3px;margin-top:2px}
.tex-instr{font-size:11px;color:var(--muted);line-height:1.5;margin-top:6px;display:none;padding-top:6px;border-top:1px solid var(--border)}
.tex-item.open .tex-instr{display:block}
.tex-toggle{font-size:10px;font-weight:600;margin-top:4px;opacity:.65;cursor:pointer}
.tblock-footer{padding:10px 14px 12px;display:flex;gap:8px}
.tbtn{flex:1;padding:10px;border-radius:9px;border:none;font-size:12px;font-weight:700;color:#fff;letter-spacing:.2px}
.tbtn:active{opacity:.8}
.tedit{padding:10px 14px;border-radius:9px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;color:var(--muted)}

/* MAIN EXERCISE CARD */
.excard{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.excard.done{opacity:.38}
.excard.active-ex{border-color:rgba(255,255,255,.18)}
.ex-img{width:100%;height:190px;overflow:hidden;background:#050a12;position:relative;cursor:pointer}
.ex-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ex-img .p0{opacity:1}.ex-img .p1{opacity:0}
.ex-img.anim .p0{animation:flip 1.6s steps(1) infinite}
.ex-img.anim .p1{animation:flip2 1.6s steps(1) infinite}
.ex-img.paused .p0,.ex-img.paused .p1{animation-play-state:paused}
.ex-anim-btn{position:absolute;bottom:8px;right:8px;font-size:10px;font-weight:700;background:rgba(0,0,0,.7);color:rgba(255,255,255,.8);padding:4px 9px;border-radius:20px;pointer-events:none}
.excard-body{padding:14px}
.ex-name{font-size:15px;font-weight:700;line-height:1.25}
.ex-muscle{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:3px}
.chips{display:flex;gap:6px;margin-top:12px}
.chip{flex:1;background:rgba(255,255,255,.04);border-radius:9px;padding:8px 4px;text-align:center}
.chip-v{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;line-height:1;display:block}
.chip-l{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.4px;margin-top:1px;display:block}
.ex-tip{font-size:11px;color:var(--muted);line-height:1.55;padding:10px 0 0;border-top:1px solid var(--border);margin-top:12px}
/* Serie progress dots */
.serie-dots{display:flex;gap:5px;margin-top:10px;align-items:center}
.serie-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);transition:.2s;cursor:pointer}
.serie-dot.done-dot{background:currentColor;border-color:currentColor}
.serie-lbl{font-size:10px;color:var(--muted);margin-left:4px}
.done-btn{width:100%;margin-top:12px;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.2px;transition:.15s}
.done-btn.marked{border-color:transparent;color:#080e1a}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--card2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;border-top:1px solid var(--border)}
.modal-hdr{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-close{font-size:20px;color:var(--muted);background:none;border:none;padding:2px 8px;line-height:1}
.modal-note{font-size:11px;color:var(--muted);padding:8px 16px 4px;flex-shrink:0}
.modal-body{overflow-y:auto;flex:1;padding:6px 14px 10px;display:flex;flex-direction:column;gap:6px}
.mitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;border:1.5px solid var(--border);background:rgba(255,255,255,.02);cursor:pointer;transition:.15s}
.mitem.sel{background:rgba(255,255,255,.05)}
.mitem-img{width:58px;height:52px;border-radius:8px;overflow:hidden;background:#050a12;flex-shrink:0;position:relative}
.mitem-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.mitem-img .p1m{opacity:0}
.mitem-img.anim img:first-child{animation:flip 1.4s steps(1) infinite}
.mitem-img.anim .p1m{animation:flip2 1.4s steps(1) infinite}
.mitem-info{flex:1;min-width:0}
.mitem-name{font-size:13px;font-weight:600;line-height:1.2}
.mitem-meta{font-size:10px;color:var(--muted);margin-top:2px}
.mitem-instr{font-size:11px;color:var(--muted);line-height:1.45;margin-top:5px;display:none}
.mitem.open .mitem-instr{display:block}
.mitem-exp{font-size:10px;font-weight:600;margin-top:3px;opacity:.6}
.mcheck{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:.15s}
.modal-footer{padding:12px 14px 28px;border-top:1px solid var(--border);flex-shrink:0}
.modal-save{width:100%;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;color:#080e1a}
</style>
</head>
<body>
<div class="topbar">
  <div class="t1"><span class="logo">ENTRENA</span></div>
  <div class="dtabs">
    <button class="dt on-legs" onclick="showDay('legs')" id="btn-legs"><em>🦵</em>PIERNAS</button>
    <button class="dt" onclick="showDay('push')" id="btn-push"><em>💪</em>EMPUJES</button>
    <button class="dt" onclick="showDay('pull')" id="btn-pull"><em>🏋️</em>TIRÓN</button>
  </div>
</div>
<div class="hero">
  <div class="htitle" id="htitle">PIERNAS</div>
  <div class="hmeta" id="hmeta">~60 min</div>
  <div class="htags" id="htags"></div>
</div>
<div class="prog">
  <div class="prog-row"><span id="ptxt">0 completados</span><span id="ppct">0%</span></div>
  <div class="prog-track"><div class="prog-fill" id="pfill"></div></div>
</div>
<div id="content"></div>
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="mtitle">Seleccionar</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-note" id="mnote"></div>
    <div class="modal-body" id="mbody"></div>
    <div class="modal-footer"><button class="modal-save" id="msave" onclick="saveModal()">Guardar selección</button></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════════
let _actx = null;
function getCtx(){
  if(!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==='suspended') _actx.resume();
  return _actx;
}
function beep(freq=880,dur=0.12,vol=0.4,delay=0){
  try{
    const ctx=getCtx();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=freq;
    const t=ctx.currentTime+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.linearRampToValueAtTime(0,t+dur);
    o.start(t); o.stop(t+dur+0.05);
  }catch(e){}
}
// unlock audio on first touch
document.addEventListener('touchstart',()=>getCtx(),{once:true});
document.addEventListener('click',()=>getCtx(),{once:true});

function sndCountdown(n){ beep(700,0.09,0.3); }
function sndGo(){ beep(880,0.07,0.5); setTimeout(()=>beep(880,0.07,0.5),90); setTimeout(()=>beep(1100,0.18,0.6),180); }
function sndEndSerie(){ beep(500,0.12,0.35); setTimeout(()=>beep(400,0.12,0.35),150); }
function sndEndExercise(){ beep(600,0.09,0.45); setTimeout(()=>beep(600,0.09,0.45),110); setTimeout(()=>beep(800,0.2,0.55),220); }
function sndEndBlock(){ [0,130,260,390].forEach((d,i)=>setTimeout(()=>beep(800+i*120,0.16,0.5),d)); }

// ══════════════════════════════════════════════════
// TIMER ENGINE — one per block key: 'warm','core','main'
// ══════════════════════════════════════════════════
const TS = { // timer state per key
  warm:{sec:0,maxSec:1,running:false,paused:false,int:null,phaseLbl:'',stepLbl:''},
  core:{sec:0,maxSec:1,running:false,paused:false,int:null,phaseLbl:'',stepLbl:''},
  main:{sec:0,maxSec:1,running:false,paused:false,int:null,phaseLbl:'',stepLbl:''},
};

function killTimer(k){
  const t=TS[k]; if(t.int){clearInterval(t.int);t.int=null;}
  t.running=false; t.paused=false;
}

function startPhase(k, sec, phaseLbl, stepLbl, onDone){
  const t=TS[k];
  if(t.int) clearInterval(t.int);
  t.sec=sec; t.maxSec=sec; t.running=true; t.paused=false;
  t.phaseLbl=phaseLbl; t.stepLbl=stepLbl;
  renderTimerBar(k);
  t.int=setInterval(()=>{
    if(t.paused) return;
    t.sec--;
    if(t.sec===3||t.sec===2||t.sec===1) sndCountdown(t.sec);
    renderTimerBar(k);
    if(t.sec<=0){ clearInterval(t.int); t.int=null; onDone(); }
  },1000);
}

function startCountdown5(k, phaseLbl, stepLbl, onGo){
  const t=TS[k];
  if(t.int) clearInterval(t.int);
  t.sec=5; t.maxSec=5; t.running=true; t.paused=false;
  t.phaseLbl='PREPARADO…'; t.stepLbl=stepLbl;
  renderTimerBar(k);
  t.int=setInterval(()=>{
    if(t.paused) return;
    t.sec--;
    if(t.sec===3||t.sec===2||t.sec===1) sndCountdown(t.sec);
    renderTimerBar(k);
    if(t.sec<=0){ clearInterval(t.int); t.int=null; sndGo(); t.phaseLbl=phaseLbl; onGo(); }
  },1000);
}

function pauseTimer(k){
  const t=TS[k]; t.paused=!t.paused; renderTimerBar(k);
}
function restartTimer(k){ killTimer(k); TS[k].sec=0; TS[k].maxSec=1; renderTimerBar(k); }

function renderTimerBar(k){
  const el=document.getElementById('tbar-'+k); if(!el) return;
  const t=TS[k];
  const pct=t.maxSec>0?Math.max(0,t.sec/t.maxSec*100):0;
  const color=k==='warm'?'var(--warm)':k==='core'?'var(--core)':'var(--white)';
  const mm=Math.floor(t.sec/60), ss=String(t.sec%60).padStart(2,'0');
  el.querySelector('.tbar-phase').textContent=t.phaseLbl||(t.running?'EN CURSO':'EN ESPERA');
  el.querySelector('.tbar-count').textContent=t.running?`${mm}:${ss}`:'—';
  el.querySelector('.tbar-fill').style.cssText=`width:${pct}%;background:${color}`;
  el.querySelector('.tbar-label').textContent=t.stepLbl||'';
  const pauseBtn=el.querySelector('.tbar-pause');
  if(pauseBtn) pauseBtn.textContent=t.paused?'▶':'⏸';
}

// ══════════════════════════════════════════════════
// SEQUENCE RUNNERS
// ══════════════════════════════════════════════════

// ─ WARMUP: ejercicio→12s descanso→...→fin ronda→45s→ronda siguiente
function runWarm(exList, rounds, workSec){
  killTimer('warm');
  let round=0, exIdx=0;
  highlightTex(null,'warm');

  function doEx(){
    if(exIdx>=exList.length){ endRound(); return; }
    const ex=exList[exIdx];
    highlightTex(ex.id,'warm');
    startCountdown5('warm','TRABAJO','['+ex.name+']  ×'+workSec+'s', ()=>{
      startPhase('warm', workSec, 'TRABAJO', ex.name, ()=>{
        sndEndSerie();
        markTimedDone('warm',ex.id);
        exIdx++;
        if(exIdx<exList.length){
          startPhase('warm',12,'DESCANSO','Siguiente: '+exList[exIdx].name, ()=>{ doEx(); });
        } else { endRound(); }
      });
    });
  }
  function endRound(){
    round++;
    if(round>=rounds){ sndEndBlock(); killTimer('warm'); highlightTex(null,'warm'); return; }
    exIdx=0;
    // reset done badges for next round visual
    startPhase('warm',45,'DESCANSO ENTRE RONDAS','Ronda '+(round+1)+' de '+rounds, ()=>{
      doEx();
    });
  }
  doEx();
}

// ─ CORE / MAIN: todas las series del ejercicio i→45s→ejercicio i+1
function runBlock(k, exList, getSeriesCount, workSec){
  killTimer(k);
  let exIdx=0;
  highlightEx(k, null);

  function doExercise(){
    if(exIdx>=exList.length){ sndEndBlock(); killTimer(k); highlightEx(k,null); return; }
    const ex=exList[exIdx];
    const totalSeries=getSeriesCount(ex);
    let serie=0;
    highlightEx(k, ex.id);

    function doSerie(){
      if(serie>=totalSeries){ endExercise(); return; }
      const lbl=`${ex.name}  —  serie ${serie+1}/${totalSeries}`;
      startCountdown5(k,'TRABAJO',lbl,()=>{
        startPhase(k, workSec, 'TRABAJO', lbl, ()=>{
          sndEndSerie();
          markSerieDone(k, ex.id, serie);
          serie++;
          if(serie<totalSeries){
            startPhase(k,12,'DESCANSO',`Serie ${serie+1}/${totalSeries} a punto…`, ()=>doSerie());
          } else { endExercise(); }
        });
      });
    }
    function endExercise(){
      sndEndExercise();
      markTimedDone(k, ex.id);
      exIdx++;
      if(exIdx<exList.length){
        startPhase(k,45,'DESCANSO','Siguiente: '+exList[exIdx].name, ()=>doExercise());
      } else { sndEndBlock(); killTimer(k); highlightEx(k,null); }
    }
    doSerie();
  }
  doExercise();
}

function highlightTex(id, type){
  document.querySelectorAll('.tex-item').forEach(el=>{
    el.classList.remove('active-ex');
  });
  if(id){ const el=document.getElementById('ti'+id); if(el) el.classList.add('active-ex'); }
}
function highlightEx(k, id){
  document.querySelectorAll('.excard').forEach(el=>el.classList.remove('active-ex'));
  if(id){ const el=document.getElementById('ec'+id); if(el) el.classList.add('active-ex'); }
}

// ══════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════
const B="https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises";
const I=f=>[`${B}/${f}/0.jpg`,`${B}/${f}/1.jpg`];

const WARMUP=[

function loadSel(key,pool,def){
  try{const s=localStorage.getItem('sel_'+key);if(s){const ids=JSON.parse(s).filter(id=>pool.find(e=>e.id===id));if(ids.length>=2)return new Set(ids);}}catch(e){}
  return new Set(def);
}
function saveSel(key,set){localStorage.setItem('sel_'+key,JSON.stringify([...set]));}

function initSel(){
  selLegs=loadSel('legs',POOLS.legs,DEFAULTS.legs);
  selPush=loadSel('push',POOLS.push,DEFAULTS.push);
  selPull=loadSel('pull',POOLS.pull,DEFAULTS.pull);
  selWarm=loadSel('warm',WARMUP,DEFAULTS.warm);
  selCore=loadSel('core',CORE,DEFAULTS.core);
}
function getSel(k){return k==='legs'?selLegs:k==='push'?selPush:k==='pull'?selPull:k==='warm'?selWarm:selCore;}

function render(){
  const m=META[day];
  document.getElementById('htitle').textContent=m.title;
  document.getElementById('htitle').style.color=`var(${m.c})`;
  document.getElementById('hmeta').textContent=m.meta;
  document.getElementById('htags').innerHTML=m.tags.map(t=>`<span class="htag" style="background:var(${m.dim});color:var(${m.c})">${t}</span>`).join('');
  ['legs','push','pull'].forEach(k=>document.getElementById('btn-'+k).className='dt'+(k===day?' on-'+k:''));
  document.getElementById('pfill').style.background=`var(${m.c})`;
  build(); updProg();
}

          <div class="chip"><span class="chip-v" style="color:var(${m.c});font-size:14px">${ex.rest}</span><span class="chip-l">DESCANSO</span></div>
        </div>
        <div class="serie-dots">${dotsHtml}<span class="serie-lbl">${sd}/${ex.sets} series</span></div>
        <div class="ex-tip">${ex.tip}</div>
        <button class="done-btn${done?' marked':''}" style="${done?`background:var(${m.c})`:''}" onclick="markMain('${ex.id}')">
          ${done?'✓ Completado':'→ Marcar completado'}
        </button>
      </div>
    </div>`;
  });

  h+='</div>';
  document.getElementById('content').innerHTML=h;
  // re-render timer bars (in case they were running)
  ['warm','core','main'].forEach(k=>renderTimerBar(k));
}

function texRow(ex,done,type,color){
  return `<div class="tex-item${done?' done':''}" id="ti${ex.id}">
    <div class="tex-active-dot"></div>
    <div class="tex-img anim" onclick="toggleTimed('${type}','${ex.id}')">
      <img class="p0" src="${ex.img[0]}" loading="lazy" alt="">
      <img class="p1" src="${ex.img[1]}" loading="lazy" alt="">
      <div class="tex-done-badge">✓</div>
    </div>
    <div class="tex-body">
      <div class="tex-name" onclick="expandTex('${ex.id}')">${ex.name}</div>
      <div class="tex-meta" style="color:${color}">${ex.meta}</div>
      <div class="tex-instr">${ex.instr}</div>
      <div class="tex-toggle" style="color:${color}" onclick="expandTex('${ex.id}')" id="texp${ex.id}">▸ instrucciones</div>
    </div>
  </div>`;
}

function sec(color,label,mode){
  const b=mode?`<button class="sec-btn" onclick="openModal('${mode}')">✏ Editar</button>`:'';
  return `<div class="sec"><div class="sec-dot" style="background:${color}"></div><span class="sec-lbl">${label}</span><div class="sec-line"></div>${b}</div>`;
}

function updProg(){
  const ml=POOLS[day].filter(e=>getSel(day).has(e.id));
  const total=ml.length+selWarm.size+selCore.size;
  const count=Object.values(doneMain).filter(Boolean).length+doneWarmSet.size+doneCoreSet.size;
  const pct=total?Math.round(count/total*100):0;
  document.getElementById('ptxt').textContent=`${count} de ${total} completados`;
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pfill').style.width=pct+'%';
}

// ══════════════════════════════════════════════════
// SEQUENCE STARTERS
// ══════════════════════════════════════════════════
function startWarm(){
  // unlock audio
  getCtx();
  const wl=WARMUP.filter(e=>selWarm.has(e.id));
  doneWarmSet=new Set();
  build();
  runWarm(wl, 3, 25);
}

function startCore(){
  getCtx();
  const cl=CORE.filter(e=>selCore.has(e.id));
  doneCoreSet=new Set();
  build();
  runBlock('core', cl, ex=>4, 30);
}

function startMain(){
  getCtx();
  const ml=POOLS[day].filter(e=>getSel(day).has(e.id));
  seriesDone={};
  doneMain={};
  build();
  runBlock('main', ml, ex=>ex.sets, 40);
}

// Override markTimedDone called from sequences
function markTimedDone(type, id){
  if(type==='warm') doneWarmSet.add(id);
  else if(type==='core') doneCoreSet.add(id);
  else doneMain[id]=true;
  const el=document.getElementById('ti'+id)||document.getElementById('ec'+id);
  if(el) el.classList.add('done');
  updProg();
}

function markSerieDone(k, id, serieIdx){
  if(k==='main'){
    seriesDone[id]=(seriesDone[id]||0)+1;
    // update dots
    const dots=document.querySelectorAll(`#ec${id} .serie-dot`);
    dots.forEach((d,i)=>d.classList.toggle('done-dot',i<seriesDone[id]));
    const lbl=document.querySelector(`#ec${id} .serie-lbl`);
    const ex=POOLS[day].find(e=>e.id===id);
    if(lbl&&ex) lbl.textContent=`${seriesDone[id]}/${ex.sets} series`;
  }
}

// ══════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════
function showDay(d){
  day=d; doneMain={}; doneWarmSet=new Set(); doneCoreSet=new Set(); seriesDone={};
  ['warm','core','main'].forEach(k=>killTimer(k));
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function markMain(id){
  doneMain[id]=!doneMain[id];
  if(!doneMain[id]) delete seriesDone[id];
  build(); updProg();
}

function toggleSerie(id, idx){
  const ex=POOLS[day].find(e=>e.id===id); if(!ex) return;
  const cur=seriesDone[id]||0;
  // clicking a dot toggles up to that series
  seriesDone[id]= idx<cur ? idx : idx+1;
  if(seriesDone[id]>=ex.sets){ doneMain[id]=true; }
  else { doneMain[id]=false; }
  build(); updProg();
}

function toggleTimed(type,id){
  const s=type==='warm'?doneWarmSet:doneCoreSet;
  if(s.has(id))s.delete(id);else s.add(id);
  const el=document.getElementById('ti'+id);
  if(el) el.classList.toggle('done',s.has(id));
  updProg();
}

function expandTex(id){
  const item=document.getElementById('ti'+id); if(!item)return;
  const open=item.classList.toggle('open');
  const btn=document.getElementById('texp'+id); if(btn) btn.textContent=open?'▾ ocultar':'▸ instrucciones';
}

function pauseImg(id,el){
  const paused=el.classList.toggle('paused');
  const btn=document.getElementById('eab'+id); if(btn) btn.textContent=paused?'▶ animar':'⏸ pausar';
}

// ══════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════
const MCFG={
  warm:{title:'Calentamiento',color:'var(--warm)',pool:WARMUP,min:2,max:8},
  core:{title:'Core',color:'var(--core)',pool:CORE,min:2,max:8},
  legs:{title:'Piernas — ejercicios',color:'var(--legs)',pool:POOLS.legs,min:4,max:12},
  push:{title:'Empujes — ejercicios',color:'var(--push)',pool:POOLS.push,min:4,max:12},
  pull:{title:'Tirón — ejercicios',color:'var(--pull)',pool:POOLS.pull,min:4,max:12},
};
function openModal(mode){
  mMode=mode; const cfg=MCFG[mode]; const sel=getSel(mode);
  mTemp=new Set(sel);
  document.getElementById('mtitle').textContent=cfg.title;
  document.getElementById('msave').style.background=cfg.color;
  document.getElementById('mnote').textContent=`Mín. ${cfg.min} · Máx. ${cfg.max} · ${sel.size} seleccionados`;
  document.getElementById('mbody').innerHTML=cfg.pool.map(ex=>{
    const s=sel.has(ex.id);
    return `<div class="mitem${s?' sel':''}" id="mi${ex.id}" style="color:${s?cfg.color:'var(--muted)'}" onclick="toggleMI('${ex.id}')">
      <div class="mitem-img anim"><img src="${ex.img[0]}" loading="lazy" alt=""><img class="p1m" src="${ex.img[1]}" loading="lazy" alt=""></div>
      <div class="mitem-info">
        <div class="mitem-name">${ex.name}</div>
        <div class="mitem-meta">${ex.meta||(ex.sets+'×'+ex.reps)}</div>
        <div class="mitem-instr">${ex.instr||ex.tip}</div>
        <div class="mitem-exp" onclick="expandMI('${ex.id}',event)">▸ instrucciones</div>
      </div>
      <div class="mcheck" id="mc${ex.id}" style="${s?`border-color:${cfg.color};background:${cfg.color};color:#080e1a`:''}">${s?'✓':''}</div>
    </div>`;
  }).join('');
  document.getElementById('overlay').classList.add('open');
}
function toggleMI(id){
  const cfg=MCFG[mMode]; const el=document.getElementById('mi'+id); const chk=document.getElementById('mc'+id);
  if(mTemp.has(id)){
    if(mTemp.size<=cfg.min){flashNote(`Mínimo ${cfg.min} ejercicios`);return;}
    mTemp.delete(id); el.classList.remove('sel'); el.style.color='var(--muted)'; chk.style.cssText=''; chk.textContent='';
  }else{
    if(mTemp.size>=cfg.max){flashNote(`Máximo ${cfg.max} ejercicios`);return;}
    mTemp.add(id); el.classList.add('sel'); el.style.color=cfg.color;
    chk.style.cssText=`border-color:${cfg.color};background:${cfg.color};color:#080e1a`; chk.textContent='✓';
  }
  document.getElementById('mnote').textContent=`Mín. ${cfg.min} · Máx. ${cfg.max} · ${mTemp.size} seleccionados`;
}
function flashNote(msg){const n=document.getElementById('mnote');const p=n.textContent;n.style.color='var(--warm)';n.textContent=msg;setTimeout(()=>{n.style.color='';n.textContent=p;},1500);}
function expandMI(id,e){e.stopPropagation();const item=document.getElementById('mi'+id);const open=item.classList.toggle('open');e.target.textContent=open?'▾ ocultar':'▸ instrucciones';}
function saveModal(){
  if(mMode==='warm'){selWarm=new Set(mTemp);saveSel('warm',selWarm);}
  else if(mMode==='core'){selCore=new Set(mTemp);saveSel('core',selCore);}
  else if(mMode==='legs'){selLegs=new Set(mTemp);saveSel('legs',selLegs);}
  else if(mMode==='push'){selPush=new Set(mTemp);saveSel('push',selPush);}
  else if(mMode==='pull'){selPull=new Set(mTemp);saveSel('pull',selPull);}
  closeModal(); doneMain={}; seriesDone={}; build(); updProg();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

initSel();
render();
</script>
</body>
</html>
