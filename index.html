<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Entrena</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --legs:#22c55e;--legs-bg:#031a0e;--legs-dim:#0a2e18;
  --push:#3b82f6;--push-bg:#020d1f;--push-dim:#0a1e3a;
  --pull:#a855f7;--pull-bg:#0f0220;--pull-dim:#1a0838;
  --warm:#f97316;--core:#06b6d4;
  --surface:#080e1a;--card:#111827;--card2:#141f30;
  --border:#1e2d42;--muted:#607080;--white:#e8f0f8;--r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--surface);color:var(--white);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
button{font-family:inherit;cursor:pointer}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:60;
  background:rgba(8,14,26,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:10px 14px 9px;
}
.t1{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;flex:1}
.dtabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.dt{padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);background:rgba(255,255,255,.02);font-size:11px;font-weight:700;color:var(--muted);text-align:center;line-height:1.3;letter-spacing:.3px;transition:.15s}
.dt em{display:block;font-style:normal;font-size:16px;margin-bottom:2px}
.dt.on-legs{background:var(--legs-bg);color:var(--legs);border-color:var(--legs)}
.dt.on-push{background:var(--push-bg);color:var(--push);border-color:var(--push)}
.dt.on-pull{background:var(--pull-bg);color:var(--pull);border-color:var(--pull)}

/* ── FIXED TIMER BAR — always on screen like ecommerce sticky CTA ── */
.fixed-timer{
  position:fixed;
  left:0;right:0;
  z-index:55;
  padding:0 14px;
  /* top set dynamically by JS to sit just below topbar */
}
.ftimer-card{
  background:rgba(14,20,34,.97);
  backdrop-filter:blur(16px);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  transition:border-color .3s, box-shadow .3s;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.ftimer-card.active{
  border-color:rgba(255,255,255,.18);
  box-shadow:0 4px 28px rgba(0,0,0,.6);
}
/* row 1: block label + exercise counter */
.ft-top{display:flex;align-items:center;padding:8px 14px 0;gap:8px}
.ft-block{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex:1;color:var(--muted)}
.ft-excount{font-size:11px;font-weight:700}
/* row 2: phase + BIG clock + buttons */
.ft-main{display:flex;align-items:center;padding:2px 14px 6px;gap:10px}
.ft-phase{flex:1;min-width:0}
.ft-phase-lbl{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ft-phase-sub{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--white);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:1px;line-height:1.1}
.ft-clock{font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:2px;line-height:1;min-width:88px;text-align:right;transition:color .3s}
.ft-btns{display:flex;gap:5px;flex-shrink:0}
.ft-btn{width:36px;height:32px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s}
.ft-btn:active{opacity:.6}
/* progress bar */
.ft-track{height:5px;background:rgba(255,255,255,.07)}
.ft-fill{height:100%;transition:width .95s linear}
/* step text */
.ft-step{font-size:11px;color:var(--muted);padding:5px 14px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1}

/* ── PAGE CONTENT — padded to avoid overlapping fixed elements ── */
/* topbar ~107px + timer ~110px + gap */
.page-top-pad{height:230px} /* filled dynamically */

/* ── HERO ── */
.hero{padding:14px 16px 8px;text-align:center}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;line-height:1}
.hmeta{font-size:12px;color:var(--muted);margin-top:3px}
.htags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.htag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.4px}

/* ── PROGRESS ── */
.prog{padding:0 16px 10px}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
.prog-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}

/* ── SECTION ── */
.sec{display:flex;align-items:center;gap:8px;padding:12px 16px 6px}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-btn{font-size:11px;font-weight:600;color:var(--muted);padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;white-space:nowrap}

/* ── CARDS ── */
.cards{padding:0 16px;display:flex;flex-direction:column;gap:10px;padding-bottom:24px}

/* ── TIMED BLOCK ── */
.tblock{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden}
.tblock-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--border)}
.tblock-title{font-size:10px;font-weight:700;letter-spacing:.7px}
.tblock-sub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.tex-list{display:flex;flex-direction:column}
.tex-item{display:flex;align-items:stretch;border-bottom:1px solid var(--border);transition:background .15s}
.tex-item:last-child{border-bottom:none}
.tex-item.done{opacity:.33}
.tex-item.active-ex{background:rgba(255,255,255,.05)}
.tex-img{width:78px;min-height:78px;flex-shrink:0;overflow:hidden;background:#050a12;position:relative;cursor:pointer}
.tex-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.tex-img .p0{opacity:1}.tex-img .p1{opacity:0}
.tex-img.anim .p0{animation:flip 1.4s steps(1) infinite}
.tex-img.anim .p1{animation:flip2 1.4s steps(1) infinite}
@keyframes flip{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes flip2{0%,49%{opacity:0}50%,100%{opacity:1}}
.tex-done-badge{display:none;position:absolute;inset:0;background:rgba(0,0,0,.65);align-items:center;justify-content:center;font-size:22px}
.tex-item.done .tex-done-badge{display:flex}
.tex-body{flex:1;padding:9px 12px;min-width:0;display:flex;flex-direction:column;justify-content:center}
.tex-name{font-size:13px;font-weight:600;line-height:1.3;color:var(--white);cursor:pointer}
.tex-meta{font-size:10px;font-weight:700;letter-spacing:.3px;margin-top:2px}
.tex-instr{font-size:11px;color:var(--muted);line-height:1.5;margin-top:6px;display:none;padding-top:6px;border-top:1px solid var(--border)}
.tex-item.open .tex-instr{display:block}
.tex-toggle{font-size:10px;font-weight:600;margin-top:4px;opacity:.65;cursor:pointer}
.tblock-footer{padding:9px 14px 11px;display:flex;gap:8px}
.tbtn{flex:1;padding:10px;border-radius:9px;border:none;font-size:12px;font-weight:700;color:#fff;letter-spacing:.2px}
.tbtn:active{opacity:.8}
.tedit{padding:10px 14px;border-radius:9px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:600;color:var(--muted)}

/* ── MAIN CARD ── */
.excard{background:var(--card);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;transition:border-color .2s}
.excard.done{opacity:.33}
.excard.active-ex{border-color:rgba(255,255,255,.2)}
.ex-img{width:100%;height:185px;overflow:hidden;background:#050a12;position:relative;cursor:pointer}
.ex-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ex-img .p0{opacity:1}.ex-img .p1{opacity:0}
.ex-img.anim .p0{animation:flip 1.6s steps(1) infinite}
.ex-img.anim .p1{animation:flip2 1.6s steps(1) infinite}
.ex-img.paused .p0,.ex-img.paused .p1{animation-play-state:paused}
.ex-anim-btn{position:absolute;bottom:8px;right:8px;font-size:10px;font-weight:700;background:rgba(0,0,0,.7);color:rgba(255,255,255,.8);padding:4px 9px;border-radius:20px;pointer-events:none}
.excard-body{padding:13px}
.ex-name{font-size:15px;font-weight:700;line-height:1.25}
.ex-muscle{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:3px}
.chips{display:flex;gap:6px;margin-top:11px}
.chip{flex:1;background:rgba(255,255,255,.04);border-radius:9px;padding:7px 4px;text-align:center}
.chip-v{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;line-height:1;display:block}
.chip-l{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.4px;margin-top:1px;display:block}
.serie-dots{display:flex;gap:5px;margin-top:10px;align-items:center}
.serie-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid var(--border);transition:.2s;cursor:pointer}
.serie-dot.done-dot{background:currentColor;border-color:currentColor}
.serie-lbl{font-size:10px;color:var(--muted);margin-left:4px}
.ex-tip{font-size:11px;color:var(--muted);line-height:1.55;padding:9px 0 0;border-top:1px solid var(--border);margin-top:11px}
/* timer start button inside main card */
.ex-timer-btn{width:100%;margin-top:10px;padding:9px;border-radius:9px;border:none;font-size:12px;font-weight:700;color:#fff;letter-spacing:.2px;opacity:.85}
.ex-timer-btn:active{opacity:.6}
.done-btn{width:100%;margin-top:8px;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.2px;transition:.15s}
.done-btn.marked{border-color:transparent;color:#080e1a}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.85);align-items:flex-end}
.overlay.open{display:flex}
.modal{background:var(--card2);border-radius:20px 20px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;border-top:1px solid var(--border)}
.modal-hdr{padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-size:15px;font-weight:700}
.modal-close{font-size:20px;color:var(--muted);background:none;border:none;padding:2px 8px;line-height:1}
.modal-note{font-size:11px;color:var(--muted);padding:8px 16px 4px;flex-shrink:0}
.modal-body{overflow-y:auto;flex:1;padding:6px 14px 10px;display:flex;flex-direction:column;gap:6px}
.mitem{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:12px;border:1.5px solid var(--border);background:rgba(255,255,255,.02);cursor:pointer;transition:.15s}
.mitem.sel{background:rgba(255,255,255,.05)}
.mitem-img{width:56px;height:50px;border-radius:8px;overflow:hidden;background:#050a12;flex-shrink:0;position:relative}
.mitem-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.mitem-img .p1m{opacity:0}
.mitem-img.anim img:first-child{animation:flip 1.4s steps(1) infinite}
.mitem-img.anim .p1m{animation:flip2 1.4s steps(1) infinite}
.mitem-info{flex:1;min-width:0}
.mitem-name{font-size:13px;font-weight:600;line-height:1.2}
.mitem-meta{font-size:10px;color:var(--muted);margin-top:2px}
.mitem-instr{font-size:11px;color:var(--muted);line-height:1.45;margin-top:5px;display:none}
.mitem.open .mitem-instr{display:block}
.mitem-exp{font-size:10px;font-weight:600;margin-top:3px;opacity:.6}
.mcheck{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;transition:.15s}
.modal-footer{padding:12px 14px 28px;border-top:1px solid var(--border);flex-shrink:0}
.modal-save{width:100%;padding:13px;border-radius:12px;border:none;font-size:14px;font-weight:700;color:#080e1a}
</style>
</head>
<body>

<!-- FIXED TOPBAR -->
<div class="topbar" id="topbar">
  <div class="t1"><span class="logo">ENTRENA</span></div>
  <div class="dtabs">
    <button class="dt on-legs" onclick="showDay('legs')" id="btn-legs"><em>🦵</em>PIERNAS</button>
    <button class="dt" onclick="showDay('push')" id="btn-push"><em>💪</em>EMPUJES</button>
    <button class="dt" onclick="showDay('pull')" id="btn-pull"><em>🏋️</em>TIRÓN</button>
  </div>
</div>

<!-- FIXED TIMER — always visible, like ecommerce sticky CTA -->
<div class="fixed-timer" id="fixed-timer">
  <div class="ftimer-card" id="ftcard">
    <div class="ft-top">
      <span class="ft-block" id="ft-block">EN ESPERA</span>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
        <span class="ft-excount" id="ft-round"></span>
        <span class="ft-excount" id="ft-excount"></span>
      </div>
    </div>
    <div class="ft-main">
      <div class="ft-phase">
        <div class="ft-phase-lbl" id="ft-lbl">Pulsa ▶ en cualquier bloque</div>
        <div class="ft-phase-sub" id="ft-sub"></div>
      </div>
      <div class="ft-clock" id="ft-clock" style="color:var(--muted)">—</div>
      <div class="ft-btns">
        <button class="ft-btn" id="ft-pause" onclick="timerPause()" title="Pausa">⏸</button>
        <button class="ft-btn" onclick="timerRestart()" title="Reiniciar">↺</button>
      </div>
    </div>
    <div class="ft-track"><div class="ft-fill" id="ft-fill" style="width:0%"></div></div>
    <div class="ft-step" id="ft-step"> </div>
  </div>
</div>

<!-- SPACER — height set by JS to match topbar + timer height -->
<div id="page-pad"></div>

<div class="hero">
  <div class="htitle" id="htitle">PIERNAS</div>
  <div class="hmeta" id="hmeta">~60 min</div>
  <div class="htags" id="htags"></div>
</div>
<div class="prog">
  <div class="prog-row"><span id="ptxt">0 completados</span><span id="ppct">0%</span></div>
  <div class="prog-track"><div class="prog-fill" id="pfill"></div></div>
</div>
<div id="content"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="mtitle">Seleccionar</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-note" id="mnote"></div>
    <div class="modal-body" id="mbody"></div>
    <div class="modal-footer"><button class="modal-save" id="msave" onclick="saveModal()">Guardar selección</button></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// LAYOUT: measure fixed elements and set spacer
// ══════════════════════════════════════════════════
function setLayout(){
  const tb=document.getElementById('topbar');
  const ft=document.getElementById('fixed-timer');
  const tbH=tb.getBoundingClientRect().height;
  ft.style.top=tbH+'px';
  const ftH=ft.getBoundingClientRect().height;
  document.getElementById('page-pad').style.height=(tbH+ftH+6)+'px';
}
window.addEventListener('resize',setLayout);
// call after render

// ══════════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════════
let _actx=null;
function getCtx(){
  if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==='suspended')_actx.resume();
  return _actx;
}
function beep(freq=880,dur=0.12,vol=0.4,delay=0){
  try{const ctx=getCtx();const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);o.frequency.value=freq;
    const t=ctx.currentTime+delay;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.015);g.gain.linearRampToValueAtTime(0,t+dur);
    o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}
document.addEventListener('touchstart',()=>getCtx(),{once:true});
document.addEventListener('click',()=>getCtx(),{once:true});

function sndCountdown(){ beep(700,0.09,0.3); }
function sndGo(){
  // Long start beep — signals end of rest, beginning of work
  beep(440,0.06,0.2);
  beep(660,0.06,0.3,0.07);
  beep(880,0.8,0.6,0.14); // long sustained tone
}
function sndEndWork(){
  // Referee whistle style — loud, long, unmistakable
  beep(900,0.06,0.7);
  setTimeout(()=>beep(900,0.06,0.7),80);
  setTimeout(()=>beep(900,0.55,0.85),160); // long sustained loud tone
}
function sndEndExercise(){
  // Triple mid beep — exercise complete
  beep(600,0.08,0.4);
  setTimeout(()=>beep(600,0.08,0.4),110);
  setTimeout(()=>beep(800,0.18,0.5),220);
}
function sndEndBlock(){
  // Four rising beeps — block complete
  [0,140,280,420].forEach((d,i)=>setTimeout(()=>beep(700+i*130,0.18,0.5),d));
}
function sndEndRest(){
  // THE key beep: long tone signaling "get ready, work starts"
  // Same as sndGo — played at end of rest countdown (3,2,1 ticks then this)
  sndGo();
}

// ══════════════════════════════════════════════════
// UNIFIED TIMER STATE
// ══════════════════════════════════════════════════
const T={
  sec:0,maxSec:1,
  running:false,paused:false,int:null,
  blockKey:'',color:'var(--white)',
  phaseLbl:'',phaseSub:'',stepLbl:'',serieLabel:'',roundLabel:'',
  exTotal:0,exDone:0,
};

function killTimer(){
  if(T.int){clearInterval(T.int);T.int=null;}
  T.running=false;T.paused=false;
}

// Start a phase. onDone fires when sec reaches 0.
// isRest=true: long beep at the end (signals start of next work)
function startPhase(sec,phaseLbl,phaseSub,stepLbl,isRest,onDone){
  if(T.int) clearInterval(T.int);
  T.sec=sec;T.maxSec=sec;
  T.phaseLbl=phaseLbl;T.phaseSub=phaseSub;T.stepLbl=stepLbl;
  T.running=true;T.paused=false;
  renderTimer();
  T.int=setInterval(()=>{
    if(T.paused) return;
    T.sec--;
    if(T.sec===3||T.sec===2||T.sec===1) sndCountdown();
    renderTimer();
    if(T.sec<=0){
      clearInterval(T.int);T.int=null;
      if(isRest) sndEndRest(); // long beep = go!
      onDone();
    }
  },1000);
}

// 5s countdown only at the very start of a block
function startCountdown5(firstExName,onGo){
  T.serieLabel=firstExName.split(' · ')[0]+' 1/3';
  T.roundLabel='';
  if(T.int) clearInterval(T.int);
  T.sec=5;T.maxSec=5;
  T.phaseLbl='PREPARADO…';T.phaseSub='';T.stepLbl=firstExName;
  T.running=true;T.paused=false;
  renderTimer();
  T.int=setInterval(()=>{
    if(T.paused) return;
    T.sec--;
    if(T.sec===3||T.sec===2||T.sec===1) sndCountdown();
    renderTimer();
    if(T.sec<=0){ clearInterval(T.int);T.int=null; sndEndRest(); onGo(); }
  },1000);
}

function timerPause(){
  if(!T.running) return;
  T.paused=!T.paused;
  document.getElementById('ft-pause').textContent=T.paused?'▶':'⏸';
}
function timerRestart(){
  killTimer();
  T.sec=0;T.maxSec=1;T.phaseLbl='';T.phaseSub='';T.stepLbl='';T.blockKey='';
  T.exDone=0;T.exTotal=0;T.roundLabel='';T.serieLabel='';
  renderTimer();
}

function renderTimer(){
  const pct=T.maxSec>0?Math.max(0,T.sec/T.maxSec*100):0;
  const mm=Math.floor(T.sec/60),ss=String(T.sec%60).padStart(2,'0');
  const card=document.getElementById('ftcard');
  card.classList.toggle('active',T.running);

  const bNames={warm:'CALENTAMIENTO',core:'CORE',main:'EJERCICIOS PRINCIPALES','':'EN ESPERA'};
  const bEl=document.getElementById('ft-block');
  bEl.textContent=bNames[T.blockKey]||'EN ESPERA';
  bEl.style.color=T.running?T.color:'var(--muted)';

  const ec=document.getElementById('ft-excount');
  const rc=document.getElementById('ft-round');
  const exNum=T.exTotal>0?(T.phaseLbl==='DESCANSO'&&T.exDone>0?T.exDone:T.exDone+1):0;
  ec.textContent=T.exTotal>0&&T.running?`Ej. ${exNum}/${T.exTotal}`:'';
  ec.style.color=T.color;
  // Round counter — only shown for blocks that have rounds (warm) or series
  if(rc){
    rc.textContent=T.roundLabel&&T.running?T.roundLabel:'';
    rc.style.color=T.color;
  }

  const isIdle=!T.running;
  document.getElementById('ft-lbl').textContent=isIdle?'PULSA ▶ PARA EMPEZAR':(T.phaseLbl||'EN CURSO');
  // Big name + counter line
  const bigLabel=T.serieLabel||T.phaseSub||'';
  document.getElementById('ft-sub').textContent=isIdle?'':bigLabel;

  const clk=document.getElementById('ft-clock');
  clk.textContent=T.running?`${mm}:${ss}`:'—';
  clk.style.color=T.running?T.color:'var(--muted)';

  document.getElementById('ft-fill').style.cssText=`width:${pct}%;background:${T.color}`;
  document.getElementById('ft-step').textContent=T.stepLbl||'\u00a0';
  document.getElementById('ft-pause').textContent=T.paused?'▶':'⏸';
}

// SEQUENCE RUNNERS
// ══════════════════════════════════════════════════

// WARMUP: each exercise once → 12s rest → next → end of round → 45s → next round × 3
function runWarm(exList){
  killTimer();
  T.blockKey='warm';T.color='var(--warm)';
  T.exTotal=3;T.exDone=0;
  let round=0,exIdx=0;
  highlightTex(null);

  function doEx(){
    if(exIdx>=exList.length){endRound();return;}
    const ex=exList[exIdx];
    highlightTex(ex.id);
    T.roundLabel='Ronda '+(round+1)+'/3';
    T.serieLabel=ex.name+' '+(round+1)+'/3';
    startPhase(25,'TRABAJO','',ex.name,false,()=>{
      sndEndWork();
      markTimedDone('warm',ex.id);
      exIdx++;
      if(exIdx<exList.length){
        // 12s rest — long beep at end signals next exercise
        T.serieLabel=exList[exIdx].name+' →';
        startPhase(12,'DESCANSO','',exList[exIdx].name,true,()=>doEx());
      } else { endRound(); }
    });
  }

  function endRound(){
    round++;T.exDone=round;renderTimer();
    if(round>=3){sndEndBlock();killTimer();highlightTex(null);T.exDone=3;renderTimer();return;}
    // 45s between rounds — long beep at end
    T.roundLabel='Ronda '+(round+1)+'/3';
    T.serieLabel=exList[0].name+' 1/3';
    startPhase(45,'DESCANSO ENTRE RONDAS','',exList[0].name,true,()=>{exIdx=0;doEx();});
  }

  startCountdown5(exList[0].name,()=>doEx());
}

// CORE/MAIN: all 3 series of each exercise → 45s → next exercise
function runBlock(key,exList,workSec,totalSeries){
  totalSeries=totalSeries||3;
  killTimer();
  T.blockKey=key;T.color=key==='core'?'var(--core)':'var(--white)';
  T.exTotal=exList.length;T.exDone=0;
  let exIdx=0;
  if(key==='main') highlightEx(null); else highlightTex(null);

  function doExercise(){
    if(exIdx>=exList.length){sndEndBlock();killTimer();T.exDone=exList.length;renderTimer();if(key==='main')highlightEx(null);else highlightTex(null);return;}
    const ex=exList[exIdx];
    // totalSeries from outer scope
    let serie=0;
    if(key==='main') highlightEx(ex.id); else highlightTex(ex.id);

    function doSerie(){
      if(serie>=totalSeries){endExercise();return;} // totalSeries is 3 or 4
      T.roundLabel='Serie '+(serie+1)+'/'+totalSeries;
      T.serieLabel=ex.name+' '+(serie+1)+'/'+totalSeries;
      startPhase(workSec,'TRABAJO','',ex.name,false,()=>{
        sndEndWork();
        markSerieDone(key,ex.id,serie);
        serie++;
        if(serie<totalSeries){
          // 12s rest between series — long beep at end
          T.roundLabel='Serie '+(serie+1)+'/'+totalSeries;
          T.serieLabel=ex.name+' '+(serie+1)+'/'+totalSeries;
          startPhase(12,'DESCANSO','',ex.name,true,()=>doSerie());
        } else { endExercise(); }
      });
    }

    function endExercise(){
      sndEndExercise();
      markTimedDone(key,ex.id);
      T.exDone=exIdx+1;renderTimer();
      exIdx++;
      if(exIdx<exList.length){
        // 45s rest between exercises — long beep at end
        T.roundLabel='Serie 1/'+totalSeries;
        T.serieLabel=exList[exIdx].name+' 1/'+totalSeries;
        startPhase(45,'DESCANSO','',exList[exIdx].name,true,()=>doExercise());
      } else { sndEndBlock();killTimer();T.exDone=exList.length;renderTimer();if(key==='main')highlightEx(null);else highlightTex(null); }
    }
    doSerie();
  }

  startCountdown5(exList[0].name+' · serie 1/3',()=>doExercise());
}

function highlightTex(id){
  document.querySelectorAll('.tex-item').forEach(el=>el.classList.remove('active-ex'));
  if(id){const el=document.getElementById('ti'+id);if(el){el.classList.add('active-ex');el.scrollIntoView({behavior:'smooth',block:'nearest'});}}
}
function highlightEx(id){
  document.querySelectorAll('.excard').forEach(el=>el.classList.remove('active-ex'));
  if(id){const el=document.getElementById('ec'+id);if(el){el.classList.add('active-ex');el.scrollIntoView({behavior:'smooth',block:'nearest'});}}
}

function render(){
  const m=META[day];
  document.getElementById('htitle').textContent=m.title;
  document.getElementById('htitle').style.color=`var(${m.c})`;
  document.getElementById('hmeta').textContent=m.meta;
  document.getElementById('htags').innerHTML=m.tags.map(t=>`<span class="htag" style="background:var(${m.dim});color:var(${m.c})">${t}</span>`).join('');
  ['legs','push','pull'].forEach(k=>document.getElementById('btn-'+k).className='dt'+(k===day?' on-'+k:''));
  document.getElementById('pfill').style.background=`var(${m.c})`;
  build();
  updProg();
  // small delay so elements are painted before measuring
  setTimeout(setLayout,50);
}

function build(){
  const m=META[day];
  const wl=WARMUP.filter(e=>selWarm.has(e.id));
  const cl=CORE.filter(e=>selCore.has(e.id));
  const ml=POOLS[day].filter(e=>getSel(day).has(e.id));
  let h='<div class="cards">';

  // WARMUP
  h+=sec('var(--warm)','Calentamiento','warm');
  h+=`<div class="tblock"><div class="tblock-hdr">
    <div class="tblock-title" style="color:var(--warm)">3 RONDAS · 25 SEG / EJERCICIO · 12 SEG ENTRE EJERCICIOS · 45 SEG ENTRE RONDAS</div>
    <div class="tblock-sub">Tap foto → marcar · Tap nombre → instrucciones</div>
  </div><div class="tex-list">`;
  wl.forEach(ex=>{h+=texRow(ex,doneWarmSet.has(ex.id),'warm','var(--warm)');});
  h+=`</div><div class="tblock-footer">
    <button class="tbtn" style="background:var(--warm)" onclick="startWarm()">▶ Iniciar calentamiento</button>
    <button class="tedit" onclick="openModal('warm')">✏</button>
  </div></div>`;

  // CORE
  h+=sec('var(--core)','Core','core');
  h+=`<div class="tblock"><div class="tblock-hdr">
    <div class="tblock-title" style="color:var(--core)">4 SERIES · 30 SEG · 12 SEG ENTRE SERIES · 45 SEG ENTRE EJERCICIOS</div>
    <div class="tblock-sub">Tap foto → marcar · Tap nombre → instrucciones</div>
  </div><div class="tex-list">`;
  cl.forEach(ex=>{h+=texRow(ex,doneCoreSet.has(ex.id),'core','var(--core)');});
  h+=`</div><div class="tblock-footer">
    <button class="tbtn" style="background:var(--core)" onclick="startCore()">▶ Iniciar core</button>
    <button class="tedit" onclick="openModal('core')">✏</button>
  </div></div>`;

  // MAIN
  h+=sec(`var(${m.c})`,'Ejercicios principales · 3 series',day);
  ml.forEach(ex=>{
    const done=!!doneMain[ex.id];
    const sd=seriesDone[ex.id]||0;
    const dots=Array.from({length:3},(_,i)=>`<div class="serie-dot${i<sd?' done-dot':''}" style="color:var(${m.c})" onclick="toggleSerie('${ex.id}',${i})"></div>`).join('');
    h+=`<div class="excard${done?' done':''}" id="ec${ex.id}">
      <div class="ex-img anim" id="ei${ex.id}" onclick="pauseImg('${ex.id}',this)">
        <img class="p0" src="${ex.img[0]}" loading="lazy" alt="">
        <img class="p1" src="${ex.img[1]}" loading="lazy" alt="">
        <span class="ex-anim-btn" id="eab${ex.id}">⏸ pausar</span>
      </div>
      <div class="excard-body">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-muscle" style="color:var(${m.c})">${ex.mus}</div>
        <div class="chips">
          <div class="chip"><span class="chip-v" style="color:var(${m.c})">3</span><span class="chip-l">SERIES</span></div>
          <div class="chip"><span class="chip-v" style="color:var(${m.c});font-size:${String(ex.reps).length>5?'14px':'20px'}">${ex.reps}</span><span class="chip-l">REPS</span></div>
          <div class="chip"><span class="chip-v" style="color:var(${m.c});font-size:14px">${ex.rest}</span><span class="chip-l">DESCANSO</span></div>
        </div>
        <div class="serie-dots">${dots}<span class="serie-lbl">${sd}/3 series</span></div>
        <div class="ex-tip">${ex.tip}</div>
        <button class="ex-timer-btn" style="background:var(${m.c})" onclick="startSingleEx('${ex.id}')">▶ Iniciar timer · 40 seg</button>
        <button class="done-btn${done?' marked':''}" style="${done?`background:var(${m.c})`:''}" onclick="markMain('${ex.id}')">
          ${done?'✓ Completado':'→ Marcar completado'}
        </button>
      </div>
    </div>`;
  });

  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

function texRow(ex,done,type,color){
  return `<div class="tex-item${done?' done':''}" id="ti${ex.id}">
    <div class="tex-img anim" onclick="toggleTimed('${type}','${ex.id}')">
      <img class="p0" src="${ex.img[0]}" loading="lazy" alt="">
      <img class="p1" src="${ex.img[1]}" loading="lazy" alt="">
      <div class="tex-done-badge">✓</div>
    </div>
    <div class="tex-body">
      <div class="tex-name" onclick="expandTex('${ex.id}')">${ex.name}</div>
      <div class="tex-meta" style="color:${color}">${ex.meta}</div>
      <div class="tex-instr">${ex.instr}</div>
      <div class="tex-toggle" style="color:${color}" onclick="expandTex('${ex.id}')" id="texp${ex.id}">▸ instrucciones</div>
    </div>
  </div>`;
}

function sec(color,label,mode){
  const b=mode?`<button class="sec-btn" onclick="openModal('${mode}')">✏ Editar</button>`:'';
  return `<div class="sec"><div class="sec-dot" style="background:${color}"></div><span class="sec-lbl">${label}</span><div class="sec-line"></div>${b}</div>`;
}

function updProg(){
  const ml=POOLS[day].filter(e=>getSel(day).has(e.id));
  const total=ml.length+selWarm.size+selCore.size;
  const count=Object.values(doneMain).filter(Boolean).length+doneWarmSet.size+doneCoreSet.size;
  const pct=total?Math.round(count/total*100):0;
  document.getElementById('ptxt').textContent=`${count} de ${total} completados`;
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pfill').style.width=pct+'%';
}

// ══════════════════════════════════════════════════
// STARTERS
// ══════════════════════════════════════════════════
function startWarm(){
  getCtx();
  const wl=WARMUP.filter(e=>selWarm.has(e.id));
  doneWarmSet=new Set();build();
  runWarm(wl);
}
function startCore(){
  getCtx();
  const cl=CORE.filter(e=>selCore.has(e.id));
  doneCoreSet=new Set();seriesDone={};build();
  runBlock('core',cl,30,4);
}
function startMain(){
  getCtx();
  const ml=POOLS[day].filter(e=>getSel(day).has(e.id));
  seriesDone={};doneMain={};build();
  runBlock('main',ml,40);
}
// Start timer for a single exercise (3 series, 40s work, 12s rest between)
function startSingleEx(id){
  getCtx();
  const ex=POOLS[day].find(e=>e.id===id);if(!ex)return;
  killTimer();
  T.blockKey='main';T.color='var('+META[day].c+')';
  T.exTotal=1;T.exDone=0;
  seriesDone[id]=0;
  highlightEx(id);
  let serie=0;
  function doSerie(){
    if(serie>=3){
      sndEndExercise();markTimedDone('main',id);
      T.exDone=1;renderTimer();highlightEx(null);return;
    }
    T.roundLabel='Serie '+(serie+1)+'/3';
    T.serieLabel=ex.name+' '+(serie+1)+'/3';
    startPhase(40,'TRABAJO','',ex.name,false,()=>{
      sndEndWork();markSerieDone('main',id,serie);
      serie++;
      if(serie<3){T.roundLabel='Serie '+serie+'/3';T.serieLabel=ex.name+' '+serie+'/3';startPhase(12,'DESCANSO','',ex.name,true,()=>doSerie());}
      else{sndEndExercise();markTimedDone('main',id);T.exDone=1;renderTimer();highlightEx(null);}
    });
  }
  startCountdown5(ex.name+' · serie 1/3',()=>doSerie());
}

function markTimedDone(type,id){
  if(type==='warm')doneWarmSet.add(id);
  else if(type==='core')doneCoreSet.add(id);
  else doneMain[id]=true;
  const el=document.getElementById('ti'+id)||document.getElementById('ec'+id);
  if(el)el.classList.add('done');
  updProg();
}
function markSerieDone(k,id,serieIdx){
  seriesDone[id]=(seriesDone[id]||0)+1;
  const dots=document.querySelectorAll(`#ec${id} .serie-dot, #ti${id} .serie-dot`);
  dots.forEach((d,i)=>d.classList.toggle('done-dot',i<seriesDone[id]));
  const lbl=document.querySelector(`#ec${id} .serie-lbl`);
  if(lbl)lbl.textContent=`${seriesDone[id]}/3 series`;
}

// ══════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════
function showDay(d){
  day=d;doneMain={};doneWarmSet=new Set();doneCoreSet=new Set();seriesDone={};
  killTimer();renderTimer();
  render();window.scrollTo({top:0,behavior:'smooth'});
}
function markMain(id){
  doneMain[id]=!doneMain[id];
  if(!doneMain[id])delete seriesDone[id];
  build();updProg();setTimeout(setLayout,50);
}
function toggleSerie(id,idx){
  const cur=seriesDone[id]||0;
  seriesDone[id]=idx<cur?idx:idx+1;
  doneMain[id]=seriesDone[id]>=3;
  build();updProg();setTimeout(setLayout,50);
}
function toggleTimed(type,id){
  const s=type==='warm'?doneWarmSet:doneCoreSet;
  if(s.has(id))s.delete(id);else s.add(id);
  const el=document.getElementById('ti'+id);
  if(el)el.classList.toggle('done',s.has(id));
  updProg();
}
function expandTex(id){
  const item=document.getElementById('ti'+id);if(!item)return;
  const open=item.classList.toggle('open');
  const btn=document.getElementById('texp'+id);if(btn)btn.textContent=open?'▾ ocultar':'▸ instrucciones';
  setTimeout(setLayout,200);
}
function pauseImg(id,el){
  const p=el.classList.toggle('paused');
  const btn=document.getElementById('eab'+id);if(btn)btn.textContent=p?'▶ animar':'⏸ pausar';
}

// ══════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════
const MCFG={
  warm:{title:'Calentamiento',color:'var(--warm)',pool:WARMUP,min:2,max:8},
  core:{title:'Core',color:'var(--core)',pool:CORE,min:2,max:8},
  legs:{title:'Piernas',color:'var(--legs)',pool:POOLS.legs,min:4,max:12},
  push:{title:'Empujes',color:'var(--push)',pool:POOLS.push,min:4,max:12},
  pull:{title:'Tirón',color:'var(--pull)',pool:POOLS.pull,min:4,max:12},
};
function openModal(mode){
  mMode=mode;const cfg=MCFG[mode];const sel=getSel(mode);
  mTemp=new Set(sel);
  document.getElementById('mtitle').textContent=cfg.title;
  document.getElementById('msave').style.background=cfg.color;
  document.getElementById('mnote').textContent=`Mín. ${cfg.min} · Máx. ${cfg.max} · ${sel.size} seleccionados`;
  document.getElementById('mbody').innerHTML=cfg.pool.map(ex=>{
    const s=sel.has(ex.id);
    return `<div class="mitem${s?' sel':''}" id="mi${ex.id}" style="color:${s?cfg.color:'var(--muted)'}" onclick="toggleMI('${ex.id}')">
      <div class="mitem-img anim"><img src="${ex.img[0]}" loading="lazy" alt=""><img class="p1m" src="${ex.img[1]}" loading="lazy" alt=""></div>
      <div class="mitem-info">
        <div class="mitem-name">${ex.name}</div>
        <div class="mitem-meta">${ex.meta||(ex.reps?'3×'+ex.reps:'')}</div>
        <div class="mitem-instr">${ex.instr||ex.tip}</div>
        <div class="mitem-exp" onclick="expandMI('${ex.id}',event)">▸ instrucciones</div>
      </div>
      <div class="mcheck" id="mc${ex.id}" style="${s?`border-color:${cfg.color};background:${cfg.color};color:#080e1a`:''}">${s?'✓':''}</div>
    </div>`;
  }).join('');
  document.getElementById('overlay').classList.add('open');
}
function toggleMI(id){
  const cfg=MCFG[mMode];const el=document.getElementById('mi'+id);const chk=document.getElementById('mc'+id);
  if(mTemp.has(id)){
    if(mTemp.size<=cfg.min){flashNote(`Mínimo ${cfg.min}`);return;}
    mTemp.delete(id);el.classList.remove('sel');el.style.color='var(--muted)';chk.style.cssText='';chk.textContent='';
  }else{
    if(mTemp.size>=cfg.max){flashNote(`Máximo ${cfg.max}`);return;}
    mTemp.add(id);el.classList.add('sel');el.style.color=cfg.color;
    chk.style.cssText=`border-color:${cfg.color};background:${cfg.color};color:#080e1a`;chk.textContent='✓';
  }
  document.getElementById('mnote').textContent=`Mín. ${cfg.min} · Máx. ${cfg.max} · ${mTemp.size} seleccionados`;
}
function flashNote(msg){const n=document.getElementById('mnote');const p=n.textContent;n.style.color='var(--warm)';n.textContent=msg;setTimeout(()=>{n.style.color='';n.textContent=p;},1500);}
function expandMI(id,e){e.stopPropagation();const item=document.getElementById('mi'+id);const open=item.classList.toggle('open');e.target.textContent=open?'▾ ocultar':'▸ instrucciones';}
function saveModal(){
  if(mMode==='warm'){selWarm=new Set(mTemp);saveSel('warm',selWarm);}
  else if(mMode==='core'){selCore=new Set(mTemp);saveSel('core',selCore);}
  else if(mMode==='legs'){selLegs=new Set(mTemp);saveSel('legs',selLegs);}
  else if(mMode==='push'){selPush=new Set(mTemp);saveSel('push',selPush);}
  else if(mMode==='pull'){selPull=new Set(mTemp);saveSel('pull',selPull);}
  closeModal();doneMain={};seriesDone={};build();updProg();setTimeout(setLayout,50);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

initSel();
render();
</script>
